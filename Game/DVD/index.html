<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brooklyn</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
    }
    #dvd-text {
      position: absolute;
      font-family: 'Courier New', Courier, monospace;
      font-size: 4rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      white-space: nowrap;
      user-select: none;
      text-shadow: 0 0 20px currentColor;
      transition: color 0.3s;
    }
    #back-btn {
      position: fixed;
      top: 1rem;
      left: 1rem;
      z-index: 10;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.6);
      font-family: 'Courier New', monospace;
      font-size: 0.85rem;
      padding: 0.4rem 0.9rem;
      border-radius: 4px;
      cursor: pointer;
      letter-spacing: 0.08em;
      transition: background 0.2s, color 0.2s;
    }
    #back-btn:hover {
      background: rgba(255,255,255,0.15);
      color: #fff;
    }
    #play-prompt {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.88);
      color: #fff;
      font-family: 'Courier New', monospace;
      font-size: 1.2rem;
      cursor: pointer;
      letter-spacing: 0.12em;
    }
  </style>
</head>
<body>

<div id="play-prompt">Click anywhere to start</div>
<button id="back-btn" onclick="history.back()">&#8592; Back</button>
<div id="dvd-text">Brooklyn</div>
<audio id="track" src="/Game/DVD/track.mp3" loop></audio>

<script>
  const el = document.getElementById('dvd-text');
  const colors = [
    '#ff4444', '#ff8800', '#ffdd00',
    '#44ff88', '#00ccff', '#aa44ff',
    '#ff44aa', '#ffffff'
  ];
  let colorIdx = 0;
  let x = 80;
  let y = 80;
  let dx = 1.8;
  let dy = 1.4;
  el.style.color = colors[colorIdx];

  function step() {
    const W = window.innerWidth;
    const H = window.innerHeight;
    const w = el.offsetWidth;
    const h = el.offsetHeight;
    x += dx;
    y += dy;
    let bounced = false;
    if (x + w >= W) {
      x = W - w;
      dx = -Math.abs(dx);
      bounced = true;
    } else if (x <= 0) {
      x = 0;
      dx = Math.abs(dx);
      bounced = true;
    }
    if (y + h >= H) {
      y = H - h;
      dy = -Math.abs(dy);
      bounced = true;
    } else if (y <= 0) {
      y = 0;
      dy = Math.abs(dy);
      bounced = true;
    }
    if (bounced) {
      colorIdx = (colorIdx + 1) % colors.length;
      el.style.color = colors[colorIdx];
    }
    el.style.left = x + 'px';
    el.style.top  = y + 'px';
    requestAnimationFrame(step);
  }
  requestAnimationFrame(step);

  const audio = document.getElementById('track');
  audio.volume = 0.7;

  const prompt = document.getElementById('play-prompt');
  prompt.addEventListener('click', () => {
    audio.play();
    prompt.style.display = 'none';
  }, { once: true });
</script>
</body>
</html>
